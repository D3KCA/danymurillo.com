          </div>
        </div>
      </div>

      <h2>Books I've Read</h2>
      <div class="cards">

          <img src="images/The_terminal_list.jpg" alt="The Terminal List cover">

          <img src="images/Mistborn the final empire.jpg" alt="Mistborn: The Final Empire cover">
